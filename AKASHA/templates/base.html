<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AKASHA{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
  {% block head %}{% endblock %}
</head>
<body>
  <!-- ─── Topbar ─────────────────────────────────────────────── -->
  <header class="topbar">
    <a href="/" class="topbar-brand">
      <em>AKASHA</em>
    </a>

    <form
      class="topbar-search"
      action="/search"
      method="get"
      hx-get="/search"
      hx-target="#main-content"
      hx-swap="outerHTML"
      hx-select="#main-content"
      hx-push-url="true"
      hx-indicator="#search-indicator, #skeleton-area"
    >
      <div class="search-wrap" style="position:relative;">
        <input
          type="text"
          name="q"
          id="q-input"
          class="input"
          placeholder="buscar…"
          value="{{ query | default('') }}"
          autocomplete="off"
          autofocus
          hx-get="/search/suggest"
          hx-trigger="keyup changed delay:250ms"
          hx-target="#suggest-dropdown"
          hx-params="q"
        >
        <button type="submit" class="btn btn-primary">&#x2315;</button>
        <span id="search-indicator" class="htmx-indicator search-spinner"></span>
        <div id="suggest-dropdown" class="suggest-dropdown"></div>
      </div>
      <div class="source-filters" id="source-filters">
        <label class="tag" id="lbl-src-web">
          <input type="checkbox" name="src_web" value="on" id="cb-src-web"
                 {% if src_web is not defined or src_web %}checked{% endif %} hidden>
          web
        </label>
        <label class="tag" id="lbl-src-eco">
          <input type="checkbox" name="src_eco" value="on" id="cb-src-eco"
                 {% if src_eco is not defined or src_eco %}checked{% endif %} hidden>
          local
        </label>
        <label class="tag" id="lbl-src-sites">
          <input type="checkbox" name="src_sites" value="on" id="cb-src-sites"
                 {% if src_sites is not defined or src_sites %}checked{% endif %} hidden>
          biblioteca
        </label>
        <label class="tag" id="lbl-src-papers">
          <input type="checkbox" name="src_papers" value="on" id="cb-src-papers"
                 {% if src_papers is defined and src_papers %}checked{% endif %} hidden>
          papers
        </label>
        <button type="button" class="tag tag-preset" title="Buscar só em Semantic Scholar, arXiv e OpenAlex (Alt+P)"
                onclick="var q=document.querySelector('[name=q]').value,u='/search?mode=papers'+(q?'&q='+encodeURIComponent(q):'');htmx.ajax('GET',u,{target:'#main-content',swap:'outerHTML',select:'#main-content'});history.pushState({},'',u)">
          só artigos
        </button>
        <select name="filetype" id="sel-filetype" class="filetype-select"
                onchange="this.form.requestSubmit()">
          <option value=""      {% if not filetype or filetype == '' %}selected{% endif %}>todos os formatos</option>
          <option value="pdf"   {% if filetype == 'pdf'  %}selected{% endif %}>PDF</option>
          <option value="epub"  {% if filetype == 'epub' %}selected{% endif %}>EPUB</option>
          <option value="docx"  {% if filetype == 'docx' %}selected{% endif %}>DOCX</option>
          <option value="txt"   {% if filetype == 'txt'  %}selected{% endif %}>TXT</option>
        </select>
      </div>
    </form>

    <nav class="topbar-nav">
      <a href="/" class="nav-link {% if active_tab == 'search' %}nav-link-active{% endif %}">busca</a>
      <a href="/library" class="nav-link {% if active_tab == 'library' %}nav-link-active{% endif %}">biblioteca</a>
      <a href="/watch-later" class="nav-link {% if active_tab == 'watch_later' %}nav-link-active{% endif %}">ver depois</a>
      <a href="/chat" class="nav-link {% if active_tab == 'chat' %}nav-link-active{% endif %}">conversa</a>
      <a href="/history" class="nav-link {% if active_tab == 'history' %}nav-link-active{% endif %}">histórico</a>
      <a href="/downloads" class="nav-link {% if active_tab == 'downloads' %}nav-link-active{% endif %}">downloads</a>
      <a href="/torrents" class="nav-link {% if active_tab == 'torrents' %}nav-link-active{% endif %}">torrents</a>
      <a href="/favorites" class="nav-link {% if active_tab == 'favorites' %}nav-link-active{% endif %}">favoritos</a>
      <a href="/lenses" class="nav-link {% if active_tab == 'lenses' %}nav-link-active{% endif %}">lenses</a>
      <a href="/domains" class="nav-link {% if active_tab == 'domains' %}nav-link-active{% endif %}">lista negra</a>
    </nav>

    {% if ollama_available is defined and not ollama_available %}
    <span class="ollama-badge" title="Ollama offline — features de IA indisponíveis">&#x25CF; offline</span>
    {% endif %}

    <button
      class="btn btn-ghost theme-toggle"
      id="theme-toggle"
      aria-label="Alternar tema"
      title="Alternar tema noturno"
      onclick="toggleTheme()"
    >&#9790;</button>

    <button
      class="btn btn-ghost shutdown-btn"
      title="Encerrar AKASHA"
      hx-post="/shutdown"
      hx-swap="none"
      hx-confirm="Encerrar o AKASHA?"
      hx-on::after-request="showToast('AKASHA encerrado.', 'info')"
    >&#x23FB;</button>
  </header>

  <!-- ─── Conteúdo principal ───────────────────────────────────── -->
  <main id="main-content" class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- ─── Toast container ──────────────────────────────────────── -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- ─── Session Insight overlay ─────────────────────────────── -->
  <div id="insight-overlay" class="insight-overlay" style="display:none" role="status" aria-live="polite">
    <div class="insight-body">
      <span class="insight-label">⬡ AKASHA</span>
      <p class="insight-text" id="insight-text"></p>
    </div>
    <button class="insight-close" title="Dispensar" onclick="dismissInsight()">×</button>
  </div>

  <!-- ─── Scripts ──────────────────────────────────────────────── -->
  <script>
    // ── Tema ────────────────────────────────────────────────────
    (function () {
      var saved = localStorage.getItem('akasha-theme');
      if (saved) {
        document.documentElement.classList.add('theme-' + saved);
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('theme-dark');
      }
    })();

    function toggleTheme() {
      var html = document.documentElement;
      var isDark = html.classList.contains('theme-dark');
      html.classList.remove('theme-dark', 'theme-light');
      var next = isDark ? 'light' : 'dark';
      html.classList.add('theme-' + next);
      localStorage.setItem('akasha-theme', next);
      document.getElementById('theme-toggle').textContent = next === 'dark' ? '\u2600' : '\u263E';
    }

    // Corrige ícone do botão ao carregar
    (function () {
      var html = document.documentElement;
      var btn = document.getElementById('theme-toggle');
      if (btn) {
        btn.textContent = html.classList.contains('theme-dark') ? '\u2600' : '\u263E';
      }
    })();

    // ── Toast ────────────────────────────────────────────────────
    function showToast(msg, type) {
      var container = document.getElementById('toast-container');
      var toast = document.createElement('div');
      toast.className = 'toast toast-' + (type || 'info');
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(function () { toast.remove(); }, 4000);
    }

    // ── Source checkboxes — localStorage + submit ───────────────
    (function () {
      var CBS = ['cb-src-web', 'cb-src-eco', 'cb-src-sites', 'cb-src-papers'];
      var LBLS = { 'cb-src-web': 'lbl-src-web', 'cb-src-eco': 'lbl-src-eco', 'cb-src-sites': 'lbl-src-sites', 'cb-src-papers': 'lbl-src-papers' };
      var DEFAULTS = { 'cb-src-web': true, 'cb-src-eco': true, 'cb-src-sites': true, 'cb-src-papers': false };

      function syncLabel(id) {
        var cb  = document.getElementById(id);
        var lbl = document.getElementById(LBLS[id]);
        if (cb && lbl) lbl.classList.toggle('tag-active', cb.checked);
      }

      // Página inicial sem query: restaurar preferências do localStorage
      var hasQuery = new URLSearchParams(window.location.search).has('q');
      if (!hasQuery) {
        CBS.forEach(function (id) {
          var stored = localStorage.getItem('akasha-' + id);
          var cb = document.getElementById(id);
          if (cb && stored !== null) cb.checked = stored === 'true';
        });
      } else {
        // Sincronizar localStorage com estado atual (vindo do servidor)
        CBS.forEach(function (id) {
          var cb = document.getElementById(id);
          if (cb) localStorage.setItem('akasha-' + id, cb.checked);
        });
      }
      CBS.forEach(syncLabel);

      document.addEventListener('change', function (e) {
        if (!e.target || !CBS.includes(e.target.id)) return;
        localStorage.setItem('akasha-' + e.target.id, e.target.checked);
        syncLabel(e.target.id);
        e.target.closest('form').requestSubmit();
      });
    })();
  </script>
  <script>
    // Alt+P → preset "só artigos"
    document.addEventListener('keydown', function(e) {
      if (e.altKey && e.key === 'p') {
        e.preventDefault();
        var q = document.querySelector('[name=q]').value;
        var u = '/search?mode=papers' + (q ? '&q=' + encodeURIComponent(q) : '');
        htmx.ajax('GET', u, {target: '#main-content', swap: 'outerHTML', select: '#main-content'});
        history.pushState({}, '', u);
      }
    });
  </script>
  {% block scripts %}{% endblock %}
  <script>
    // ── Session Insight polling ──────────────────────────────────
    (function () {
      var _shownText = null;

      function dismissInsight() {
        document.getElementById('insight-overlay').style.display = 'none';
        _shownText = null;
        fetch('/insight/dismiss', {method: 'POST'}).catch(function(){});
      }
      window.dismissInsight = dismissInsight;

      function pollInsight() {
        fetch('/insight/current')
          .then(function(r) { return r.json(); })
          .then(function(data) {
            var text = data && data.text;
            if (text && text !== _shownText) {
              _shownText = text;
              document.getElementById('insight-text').textContent = text;
              document.getElementById('insight-overlay').style.display = 'flex';
            } else if (!text) {
              document.getElementById('insight-overlay').style.display = 'none';
              _shownText = null;
            }
          })
          .catch(function(){});
      }

      // Poll a cada 10s; iniciar após 15s (dar tempo ao servidor inicializar)
      setTimeout(function() {
        pollInsight();
        setInterval(pollInsight, 10000);
      }, 15000);
    })();
  </script>
  <script>
    // Preserva lens_id no form de busca se estiver na URL atual
    (function () {
      var params = new URLSearchParams(window.location.search);
      var lensId = params.get('lens_id');
      if (lensId && lensId !== '0') {
        var form = document.querySelector('.topbar-search');
        if (form && !form.querySelector('[name=lens_id]')) {
          var h = document.createElement('input');
          h.type = 'hidden'; h.name = 'lens_id'; h.value = lensId;
          form.appendChild(h);
        }
      }
    })();
  </script>
  <script>
    // Fecha o dropdown de sugestões ao clicar fora do campo de busca
    document.addEventListener('click', function (e) {
      var wrap = document.querySelector('.search-wrap');
      var dd   = document.getElementById('suggest-dropdown');
      if (dd && wrap && !wrap.contains(e.target)) {
        dd.innerHTML = '';
      }
    });
  </script>
  <script>
    // Mede altura real da topbar e atualiza --topbar-h para que
    // sticky offsets e chat-layout usem o valor correto após wrap.
    (function () {
      var topbar = document.querySelector('.topbar');
      if (!topbar) return;
      function setTopbarH() {
        document.documentElement.style.setProperty('--topbar-h', topbar.offsetHeight + 'px');
      }
      setTopbarH();
      if (typeof ResizeObserver !== 'undefined') {
        new ResizeObserver(setTopbarH).observe(topbar);
      } else {
        window.addEventListener('resize', setTopbarH);
      }
    })();
  </script>
</body>
</html>
