{% macro result_card(r) %}
<li class="card result-card">
  <div class="result-header">
    <span class="badge badge-{{ r.source | lower }}">{{ r.source }}</span>
    {% if r.date %}<time class="result-date">{{ r.date }}</time>{% endif %}
  </div>
  <h2 class="result-title">
    <a href="{{ r.url }}" target="_blank" rel="noopener noreferrer" class="result-link">{{ r.title }}</a>
  </h2>
  {% if r.snippet %}
    <p class="result-snippet">{{ r.snippet }}</p>
  {% endif %}
  <div class="result-footer">
    <span class="result-url">{{ r.url }}</span>
    <div class="result-actions">
      <a href="{{ r.url }}" download class="btn btn-ghost btn-sm">&#x21A7; baixar</a>
      {% if r.source == "WEB" %}
      <button
        class="btn btn-ghost btn-sm"
        hx-post="/archive"
        hx-vals='{"url": "{{ r.url }}"}'
        hx-swap="none"
        hx-on::after-request="showToast(event.detail.successful ? 'Arquivado!' : 'Erro ao arquivar', event.detail.successful ? 'success' : 'error')"
      >&#x25A4; arquivar</button>
      <button
        class="btn btn-ghost card-action-icon"
        title="Adicionar à biblioteca"
        hx-post="/library/add-quick"
        hx-vals='{"url": "{{ r.url }}"}'
        hx-swap="none"
        hx-on::after-request="showToast(event.detail.successful ? 'Adicionado à biblioteca!' : 'Erro ao adicionar', event.detail.successful ? 'success' : 'error')"
      >+</button>
      <button
        class="btn btn-ghost card-action-icon"
        title="Adicionar a Sites"
        hx-post="/sites/add-quick"
        hx-vals='{"url": "{{ r.url }}"}'
        hx-swap="none"
        hx-on::after-request="showToast(event.detail.successful ? 'Adicionado a Sites!' : 'Erro ao adicionar', event.detail.successful ? 'success' : 'error')"
      >&#x2609;</button>
      <button
        class="btn btn-ghost card-action-icon card-action-block"
        title="Bloquear domínio"
        hx-post="/domains/block"
        hx-vals='{"url": "{{ r.url }}"}'
        hx-swap="none"
        hx-on::after-request="showToast(event.detail.successful ? 'Domínio bloqueado' : 'Erro ao bloquear', event.detail.successful ? 'info' : 'error')"
      >−</button>
      {% endif %}
    </div>
  </div>
</li>
{% endmacro %}
