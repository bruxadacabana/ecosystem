{% extends "base.html" %}
{% block title %}Sites — AKASHA{% endblock %}

{% block content %}
<div class="container" style="max-width:860px;margin:2rem auto;padding:0 1rem;">
  <h2 class="section-title" style="margin-bottom:1.5rem;">Sites pessoais</h2>

  <!-- ─── Formulário de adição ──────────────────────────── -->
  <form id="discover-form" style="display:flex;gap:.5rem;margin-bottom:1rem;"
    hx-post="/sites/discover"
    hx-target="#subdomain-picker"
    hx-swap="innerHTML"
    hx-indicator="#disc-spinner">
    <input type="url" name="url" class="input" placeholder="https://exemplo.com"
           required style="flex:1;">
    <button type="submit" class="btn btn-primary">Descobrir</button>
    <span id="disc-spinner" class="htmx-indicator search-spinner"></span>
  </form>
  <div id="subdomain-picker"></div>

  <!-- ─── Lista de sites ────────────────────────────────── -->
  {% include "_sites_list.html" %}
</div>
{% endblock %}
