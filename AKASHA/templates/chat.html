{% extends "base.html" %}

{% block title %}Conversa — AKASHA{% endblock %}

{% block head %}
<style>
  #chat-canvas { display:flex; flex-direction:column; gap:1rem; }

  /* Painel de raciocínio Deep Research */
  .chat-reasoning {
    font-size: .8rem;
    color: var(--text-muted, #888);
    margin-bottom: .35rem;
    border-left: 2px solid var(--accent-muted, #4466aa44);
    padding-left: .6rem;
  }
  .chat-reasoning-summary {
    cursor: pointer;
    user-select: none;
    color: var(--accent, #6688cc);
    font-size: .78rem;
    letter-spacing: .02em;
  }
  .chat-reasoning-list {
    margin: .3rem 0 0 0;
    padding-left: 1.2rem;
    list-style: none;
  }
  .chat-reasoning-step {
    padding: .1rem 0;
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .chat-reasoning-searching { color: var(--text-muted, #888); }
  .chat-reasoning-evaluating { color: var(--accent, #6688cc); }
  .chat-reasoning-done { color: var(--success, #5a9a5a); }

  /* Sugestão de indexação de domínios frequentes */
  .chat-domain-suggestion {
    display: flex;
    flex-wrap: wrap;
    gap: .4rem;
    margin-top: .5rem;
  }
  .chat-domain-index-btn {
    font-size: .78rem;
    padding: .2rem .6rem;
    border: 1px solid var(--accent-muted, #4466aa44);
    border-radius: 1rem;
    cursor: pointer;
    background: var(--surface-2, #1e2433);
    color: var(--accent, #6688cc);
    transition: background .15s;
  }
  .chat-domain-index-btn:hover { background: var(--surface-3, #252c40); }
  .chat-domain-index-btn:disabled { opacity: .5; cursor: default; }
  .chat-domain-index-btn.indexed { color: var(--success, #5a9a5a); border-color: var(--success, #5a9a5a44); }
</style>
{% endblock %}

{% block content %}
<div class="chat-layout">

  <div class="chat-header">
    <span class="chat-title">⬡ Conversa</span>
    <button class="btn btn-ghost chat-clear-btn"
            hx-post="/chat/clear"
            hx-swap="none"
            onclick="document.getElementById('chat-canvas').innerHTML='';document.getElementById('chat-sources').innerHTML='';sessionStorage.removeItem('akasha-chat-session')"
            title="Limpar conversa">✕ limpar</button>
  </div>

  <div id="chat-canvas" class="chat-canvas"></div>

  <div class="chat-input-area">
    <div id="chat-sources" class="chat-sources"></div>
    <form id="chat-form" class="chat-form" onsubmit="sendMessage(event)">
      <textarea
        id="chat-input"
        class="chat-input"
        placeholder="Pergunte algo sobre o seu índice…"
        rows="2"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage(event);}"
      ></textarea>
      <!-- DeepResearch 1: botão de toggle para Pesquisa Profunda -->
      <button type="button" id="deep-btn" class="btn btn-ghost chat-deep-btn"
              onclick="toggleDeep()" title="Pesquisa Profunda — busca mais ampla, síntese integrativa">
        🔍
      </button>
      <button type="submit" id="chat-send-btn" class="btn btn-primary chat-send-btn">&#x27A4;</button>
    </form>
    <div id="deep-indicator" class="chat-deep-indicator" style="display:none">
      🔍 Pesquisa Profunda ativa
    </div>
  </div>

</div>

<script>
// ── Persistência da conversa na sessão ──────────────────────────
// O chat-canvas é DOM puro — destruído ao navegar para outra aba.
// Salvamos no sessionStorage (apagado ao fechar o browser/aba) e
// restauramos ao carregar a página de conversa novamente.
(function () {
  var KEY = 'akasha-chat-session';

  window._saveChatSession = function () {
    var canvas = document.getElementById('chat-canvas');
    // Clona para remover IDs de streaming sem alterar o DOM ao vivo
    var clone = canvas.cloneNode(true);
    ['chat-stream-wrapper', 'chat-stream-bubble', 'chat-think-content'].forEach(function (id) {
      var el = clone.querySelector('#' + id);
      if (el) el.removeAttribute('id');
    });
    sessionStorage.setItem(KEY, JSON.stringify({
      html:        clone.innerHTML,
      sourcesHtml: (document.getElementById('chat-sources') || {}).innerHTML || '',
    }));
  };

  // Restaura ao carregar a página
  var saved = sessionStorage.getItem(KEY);
  if (saved) {
    try {
      var data   = JSON.parse(saved);
      var canvas = document.getElementById('chat-canvas');
      if (data.html) {
        canvas.innerHTML = data.html;
        canvas.scrollTop = canvas.scrollHeight;
      }
      var sources = document.getElementById('chat-sources');
      if (sources && data.sourcesHtml) sources.innerHTML = data.sourcesHtml;
    } catch (e) { /* sessão corrompida — ignora */ }
  }
})();

/* Markdown básico: escapa HTML, formata bold/italic/code/newlines */
function renderText(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

function createAkashaMessage() {
  const canvas = document.getElementById('chat-canvas');

  const wrapper = document.createElement('div');
  wrapper.className = 'chat-message-akasha';
  wrapper.id = 'chat-stream-wrapper';

  /* Badge de consenso — oculto até chegar evento consensus */
  .chat-consensus {
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    font-size: .78rem;
    padding: .25rem .6rem;
    border-radius: 1rem;
    background: var(--surface-2, #1e2433);
    border: 1px solid var(--border, #2a3044);
    margin-bottom: .4rem;
    flex-wrap: wrap;
  }
  .consensus-support  { color: var(--success, #5a9a5a); font-weight: 500; }
  .consensus-contra   { color: var(--danger,  #b05050); font-weight: 500; }
  .consensus-neutral  { color: var(--text-muted, #888); }
  .consensus-dot      { color: var(--border, #444); }

  /* Painel de raciocínio Deep Research — oculto até chegar evento step */
  const reasoning = document.createElement('details');
  reasoning.className = 'chat-reasoning';
  reasoning.style.display = 'none';
  const reasoningSummary = document.createElement('summary');
  reasoningSummary.className = 'chat-reasoning-summary';
  reasoningSummary.textContent = 'Mostrar raciocínio ▾';
  const reasoningList = document.createElement('ol');
  reasoningList.className = 'chat-reasoning-list';
  reasoning.appendChild(reasoningSummary);
  reasoning.appendChild(reasoningList);

  /* Bloco de thinking LLM — oculto enquanto não houver conteúdo */
  const thinking = document.createElement('details');
  thinking.className = 'chat-thinking';
  thinking.style.display = 'none';
  const summary = document.createElement('summary');
  summary.className = 'chat-thinking-summary';
  summary.textContent = '⟳ raciocínio';
  const thinkContent = document.createElement('div');
  thinkContent.className = 'chat-thinking-content';
  thinkContent.id = 'chat-think-content';
  thinking.appendChild(summary);
  thinking.appendChild(thinkContent);

  /* Bolha de resposta */
  const bubble = document.createElement('div');
  bubble.className = 'chat-bubble chat-bubble-akasha';
  bubble.id = 'chat-stream-bubble';

  /* Container de fontes — Chat 1: fontes colapsáveis dentro da mensagem */
  const sourcesEl = document.createElement('div');
  sourcesEl.className = 'chat-message-sources';

  wrapper.appendChild(reasoning);
  wrapper.appendChild(thinking);
  wrapper.appendChild(bubble);
  wrapper.appendChild(sourcesEl);
  canvas.appendChild(wrapper);

  return { wrapper, reasoning, reasoningList, thinking, thinkContent, bubble, sourcesEl };
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* Chat 1: fontes colapsáveis dentro da mensagem com excerpt */
function renderSourcesInMessage(container, sources) {
  const valid = (sources || []).filter(s => s.title || s.url);
  if (!valid.length) return;

  const details = document.createElement('details');
  details.className = 'chat-sources-detail';
  details.open = true;

  const summary = document.createElement('summary');
  summary.className = 'chat-sources-summary';
  summary.textContent = valid.length + ' fonte' + (valid.length !== 1 ? 's' : '');
  details.appendChild(summary);

  const ul = document.createElement('ul');
  ul.className = 'chat-sources-list';
  valid.forEach(function(s, i) {
    const li = document.createElement('li');
    const label = escHtml((s.title || s.url).slice(0, 80));
    const excerpt = s.excerpt ? escHtml(s.excerpt.slice(0, 200)) : '';
    let html = s.url
      ? '<a class="chat-source-link" href="' + escHtml(s.url) + '" target="_blank">[' + (i+1) + '] ' + label + '</a>'
      : '<span>[' + (i+1) + '] ' + label + '</span>';
    if (excerpt) {
      html += '<br><small class="chat-source-excerpt">' + excerpt + '</small>';
    }
    li.innerHTML = html;
    ul.appendChild(li);
  });
  details.appendChild(ul);
  container.appendChild(details);
}

/* Retrocompatibilidade — limpa a área legada quando fontes vão para a mensagem */
function showSources(sources) {
  const box = document.getElementById('chat-sources');
  if (box) box.innerHTML = '';
}

/* ── DeepResearch 1: toggle Pesquisa Profunda ─────────────────────── */
var _deepForced = false;

function toggleDeep() {
  _deepForced = !_deepForced;
  const btn = document.getElementById('deep-btn');
  const ind = document.getElementById('deep-indicator');
  if (_deepForced) {
    btn.classList.add('active');
    if (ind) ind.style.display = '';
  } else {
    btn.classList.remove('active');
    if (ind) ind.style.display = 'none';
  }
}

async function indexDomain(domain, btn) {
  btn.disabled = true;
  btn.textContent = '⟳ indexando…';
  try {
    const form = new FormData();
    form.append('url', 'https://' + domain);
    const r = await fetch('/library/add-quick', {method: 'POST', body: form});
    if (r.ok) {
      btn.textContent = '✓ ' + domain + ' adicionado';
      btn.classList.add('indexed');
    } else {
      btn.textContent = '✗ erro — tente pela Biblioteca';
      btn.disabled = false;
    }
  } catch (err) {
    btn.textContent = '✗ erro de rede';
    btn.disabled = false;
  }
}

async function sendMessage(e) {
  e.preventDefault();
  const input   = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send-btn');
  const message = input.value.trim();
  if (!message) return;

  input.value = '';
  input.disabled = true;
  sendBtn.disabled = true;
  document.getElementById('chat-sources').innerHTML = '';

  /* Bolha do usuário */
  const canvas = document.getElementById('chat-canvas');
  const userBubble = document.createElement('div');
  userBubble.className = 'chat-bubble chat-bubble-user';
  userBubble.innerHTML = renderText(message);
  canvas.appendChild(userBubble);
  canvas.scrollTop = canvas.scrollHeight;

  const { wrapper, reasoning, reasoningList, thinking, thinkContent, bubble, sourcesEl } = createAkashaMessage();
  let consensusBadge = null;  // badge de consenso — criado ao receber evento
  let fullText  = '';
  let thinkText = '';

  try {
    const resp = await fetch('/chat/message', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message, deep_mode: _deepForced}),
    });

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const raw = line.slice(5).trim();
        if (raw === '[DONE]') break;
        try {
          const ev = JSON.parse(raw);
          if (ev.type === 'consensus') {
            // Badge de consenso: "N suportam · M contradizem · K neutros"
            if (!consensusBadge) {
              consensusBadge = document.createElement('div');
              consensusBadge.className = 'chat-consensus';
              const parts = [];
              if ((ev.supports || 0) > 0)
                parts.push('<span class="consensus-support">✓ ' + ev.supports + ' suportam</span>');
              if ((ev.contradicts || 0) > 0)
                parts.push('<span class="consensus-contra">✗ ' + ev.contradicts + ' contradizem</span>');
              if ((ev.neutral || 0) > 0)
                parts.push('<span class="consensus-neutral">~ ' + ev.neutral + ' neutros</span>');
              consensusBadge.innerHTML = parts.join('<span class="consensus-dot"> · </span>');
              wrapper.insertBefore(consensusBadge, bubble);
              canvas.scrollTop = canvas.scrollHeight;
            }
          } else if (ev.type === 'step') {
            // DeepResearch: etapa do raciocínio — mostrar painel de reasoning
            reasoning.style.display = '';
            const li = document.createElement('li');
            li.className = 'chat-reasoning-step chat-reasoning-' + (ev.status || 'searching');
            const icon = ev.status === 'done' ? '✓' : ev.status === 'evaluating' ? '⟳' : '🔍';
            const found = ev.sources_found > 0 ? ' (' + ev.sources_found + ')' : '';
            li.textContent = icon + ' ' + escHtml(ev.query || '') + found;
            reasoningList.appendChild(li);
            canvas.scrollTop = canvas.scrollHeight;
          } else if (ev.type === 'loading') {
            // DeepResearch 1: indicador durante setup (expansão + fetch)
            bubble.innerHTML = '<span class="chat-loading-deep">' + escHtml(ev.text || '') + '</span>';
            canvas.scrollTop = canvas.scrollHeight;
          } else if (ev.type === 'fragment') {
            if (bubble.querySelector('.chat-loading-deep')) {
              // Limpa indicador de loading quando o stream começa
              bubble.innerHTML = '';
            }
            fullText += ev.text;
            bubble.innerHTML = renderText(fullText);
            canvas.scrollTop = canvas.scrollHeight;
          } else if (ev.type === 'thinking') {
            thinkText += ev.text;
            thinkContent.textContent = thinkText;
            thinking.style.display = '';
          } else if (ev.type === 'sources') {
            renderSourcesInMessage(sourcesEl, ev.sources || []);
            showSources([]);  // limpa área legada
            // DeepResearch 4: label visual de modo deep
            if (ev.mode === 'deep') {
              const modeLabel = document.createElement('div');
              modeLabel.className = 'chat-deep-mode-label';
              modeLabel.textContent = '🔍 Pesquisa Profunda';
              wrapper.insertBefore(modeLabel, bubble);
            }
          } else if (ev.type === 'domain_suggestion') {
            // Sugestão de indexação — mostra uma vez por sessão
            var sugKey = 'akasha-domain-suggest-shown';
            if (!sessionStorage.getItem(sugKey) && (ev.domains || []).length > 0) {
              sessionStorage.setItem(sugKey, '1');
              var sugDiv = document.createElement('div');
              sugDiv.className = 'chat-domain-suggestion';
              (ev.domains || []).forEach(function(item) {
                var btn = document.createElement('button');
                btn.className = 'btn chat-domain-index-btn';
                btn.textContent = '⊕ Indexar ' + item.domain + ' (' + item.visits + 'x)';
                btn.setAttribute('data-domain', item.domain);
                btn.onclick = function() { indexDomain(item.domain, btn); };
                sugDiv.appendChild(btn);
              });
              wrapper.appendChild(sugDiv);
              canvas.scrollTop = canvas.scrollHeight;
            }
          }
        } catch {}
      }
    }

    wrapper.removeAttribute('id');
    bubble.removeAttribute('id');
    thinkContent.removeAttribute('id');
  } catch(err) {
    bubble.textContent = 'Erro ao conectar com o AKASHA.';
    wrapper.removeAttribute('id');
    bubble.removeAttribute('id');
    thinkContent.removeAttribute('id');
  } finally {
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();
    window._saveChatSession();
  }
}
</script>
{% endblock %}
