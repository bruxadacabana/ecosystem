{% extends "base.html" %}

{% block title %}Lista Negra — AKASHA{% endblock %}

{% block content %}
<p class="page-subtitle">Domínios bloqueados — resultados de busca e crawl destes domínios são ignorados.</p>

<section class="lib-add-section">
  <form
    class="lib-add-form"
    hx-post="/domains/block"
    hx-target="#domains-list"
    hx-swap="outerHTML"
    hx-on::after-request="this.reset(); showToast('Domínio bloqueado.', 'success')"
  >
    <div class="lib-add-row">
      <input
        type="url"
        name="url"
        class="input"
        placeholder="https://exemplo.com"
        required
        autocomplete="off"
      >
      <button type="submit" class="btn btn-primary">+ bloquear</button>
    </div>
  </form>
</section>

{% include "_domains_list.html" %}
{% endblock %}
