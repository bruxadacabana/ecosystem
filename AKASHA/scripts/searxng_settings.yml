# =============================================================================
# SearXNG settings.yml — Configuração curada para uso com o AKASHA
#
# Usa use_default_settings para mergear com os defaults do SearXNG.
# Só sobrescreve o que é necessário — o resto vem dos defaults.
#
# Gerado por: AKASHA/scripts/setup_searxng.sh
# Referência: https://docs.searxng.org/admin/settings/settings.html
#
# NOTA: __SECRET_KEY__ é substituído pelo script de instalação.
# Para instalação manual, gere: python3 -c "import secrets; print(secrets.token_hex(32))"
# =============================================================================

# Merge com os defaults — não substitui inteiramente o settings.yml padrão.
# use_default_settings.engines.keep_only: mantém apenas esses engines.
use_default_settings:
  engines:
    keep_only:
      # Engines validados — retornam resultados consistentemente sem bloquear automação
      - startpage       # mais confiável: 10 resultados por página sem rate limit
      - bing            # bom volume: 10 resultados, sem CAPTCHA
      - google          # resultados relevantes: 8-10; pode bloquear esporadicamente
      - mojeek          # motor independente: sem bot detection, 10-11 resultados
      - qwant           # motor europeu focado em privacidade: 10-11 resultados
      - yahoo           # boa cobertura: 11 resultados, confiável
      - arxiv           # artigos científicos (categoria: science)
      - semantic scholar # artigos acadêmicos (categoria: science)
      # Removidos após validação (SearXNG 5):
      #   duckduckgo     — CAPTCHA permanente (SearxEngineCaptchaException)
      #   brave          — Rate limit agressivo (SearxEngineTooManyRequestsException, 180s)
      #   wikipedia      — 0 resultados em todas as queries testadas
      #   wikidata       — 0 resultados em todas as queries testadas

general:
  debug: false
  instance_name: "AKASHA Search"
  donation_url: false
  contact_url: false

search:
  safe_search: 0          # sem filtro — a usuária decide o que é seguro
  autocomplete: ""
  default_lang: ""        # qualquer idioma — não restringir por padrão
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  formats:
    - html
    - json               # necessário para a API JSON usada pelo AKASHA

server:
  port: 8888
  bind_address: "127.0.0.1"   # apenas local — nunca expor na rede
  secret_key: "__SECRET_KEY__"
  base_url: false              # sem base_url pública
  limiter: false               # sem rate limiting (uso local)
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-XSS-Protection: 1; mode=block
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

ui:
  static_use_hash: false
  default_locale: ""
  query_in_title: false
  infinite_scroll: false
  center_alignment: false
  default_theme: simple
  results_on_new_tab: false

outgoing:
  request_timeout: 8.0       # timeout por engine
  max_request_timeout: 15.0  # timeout total da query
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true
